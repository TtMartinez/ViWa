<body>

    <nav class="main-nav">
    <ul class="nav-list">
        <li class="nav-item">
            <a href="../index.html" class="nav-link">Inicio</a>

        <li class="nav-item dropdown" id="dropdown-productos">
            <a class="nav-link dropdown-toggle" onclick="toggleDropdown()">

            <ul class="dropdown-menu" id="dropdown-menu">

    <main class="products-page">

        <div class="products-grid" id="products-grid"></div>

    <button class="ver-carrito" onclick="abrirCarrito()">
        🛒 (<span id="contador-carrito">0</span>)
    </button>

    <div id="carrito-panel" class="compra-panel hidden">
        <h2>Carrito</h2>
        <div id="carrito-items"></div>
        <p>Total: $<span id="carrito-total">0</span></p>
        <button onclick="enviarWhatsApp()">Finalizar compra</button>
        <button onclick="cerrarCarrito()">Cerrar</button>
    </div>

    <script>
  function toggleDropdown() {
    document.getElementById("dropdown-menu").classList.toggle("open");
  }

  // Cerrar si se clickea afuera
  document.addEventListener("click", function(e) {
    const dropdown = document.getElementById("dropdown-productos");
    if (!dropdown.contains(e.target)) {
      document.getElementById("dropdown-menu").classList.remove("open");
    }
  });
</script>

    <script src="../js/script.js"></script>
