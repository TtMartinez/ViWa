<!DOCTYPE html>
<html lang="es-ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - ViWa</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

    <!-- NAV -->
    <nav class="main-nav">
        <ul class="nav-list">

            <li class="nav-item">
                <a href="../index.html" class="nav-link">Inicio</a>
            </li>

            <li class="nav-item dropdown">
                <a href="./productos.html" class="nav-link dropdown-toggle">
                    Nuestros Productos
                </a>

                <ul class="dropdown-menu">
                    <li><a href="#herbales">Jabones Herbales</a></li>
                    <li><a href="#cremosos">Jabones Cremosos</a></li>
                    <li><a href="#exfoliantes">Exfoliantes & Detox</a></li>
                    <li><a href="#balsamos">Bálsamos</a></li>
                </ul>
            </li>

        </ul>
    </nav>

    <!-- CONTENIDO -->
    <main class="products-page">

        <h1>Nuestros Productos</h1>

        <!-- HERBALES -->
        <section id="herbales">
            <h2>Jabones Herbales</h2>
            <div class="products-grid" id="grid-herbales"></div>
        </section>

        <!-- CREMOSOS -->
        <section id="cremosos">
            <h2>Jabones Cremosos</h2>
            <div class="products-grid" id="grid-cremosos"></div>
        </section>

        <!-- EXFOLIANTES -->
        <section id="exfoliantes">
            <h2>Exfoliantes & Detox</h2>
            <div class="products-grid" id="grid-exfoliantes"></div>
        </section>

        <!-- BALSAMOS -->
        <section id="balsamos">
            <h2>Bálsamos</h2>
            <div class="products-grid" id="grid-balsamos"></div>
        </section>

    </main>

    <!-- 🛒 BOTÓN CARRITO -->
    <button class="ver-carrito" onclick="abrirCarrito()">
        🛒 (<span id="contador-carrito">0</span>)
    </button>

    <!-- 🧾 PANEL CARRITO -->
    <div id="carrito-panel" class="compra-panel hidden">
        <h2>Carrito</h2>

        <div id="carrito-items"></div>

        <p>Total: $<span id="carrito-total">0</span></p>

        <button onclick="enviarWhatsApp()">Finalizar compra</button>
        <button onclick="cerrarCarrito()">Cerrar</button>
    </div>

    <!-- JS -->
    <script src="../js/productos.js"></script>
    <script src="../js/script.js"></script>

</body>
</html>
